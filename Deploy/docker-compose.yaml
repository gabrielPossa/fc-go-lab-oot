services:
  zipkin-all-in-one:
    image: openzipkin/zipkin:latest
    restart: always
    ports:
      - "9411:9411"

  otel-collector:
    build:
      context: otel
      dockerfile: Dockerfile
    restart: always
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "1888:1888"   # pprof extension
      - "13133:13133" # health_check extension
      - "4317:4317"   # OTLP gRPC receiver
      - "55679:55679" # zpages extension
    healthcheck:
      # sonda a extensao health_check via o busybox estatico embutido na imagem
      test: ["CMD", "/busybox", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 3s
    depends_on:
      - zipkin-all-in-one

  cep:
    build:
      context: ..
      dockerfile: Deploy/cep/Dockerfile
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      weather:
        condition: service_started
      otel-collector:
        condition: service_healthy

  weather:
    build:
      context: ..
      dockerfile: Deploy/weather/Dockerfile
    restart: always
    environment:
      - API_KEY=${API_KEY}
    depends_on:
      otel-collector:
        condition: service_healthy
